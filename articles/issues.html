<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine Craft | Tekkit Classic SMP</title>
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --code-bg: #000000;
        }

        body {
            font-family: 'Inter', sans-serif;
            /* Replace 'background.jpg' with your image URL or file path */
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), 
                url("assets/bg.jpg"); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Keeps the image still while you scroll */
            color: var(--text);
            margin: 0;
            line-height: 1.6;
            min-height: 100vh;
            }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .back-link {
            display: inline-block;
            color: var(--accent);
            text-decoration: none;
            margin-bottom: 30px;
            font-weight: bold;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--text);
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .meta {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 40px;
            border-bottom: 1px solid #334155;
            padding-bottom: 20px;
        }

        h2 {
            color: var(--accent);
            margin-top: 40px;
            border-left: 4px solid var(--accent);
            padding-left: 15px;
        }

        p { margin-bottom: 20px; }

        .pro-tip {
            background: rgba(56, 189, 248, 0.1);
            border-radius: 8px;
            padding: 20px;
            border-right: 4px solid var(--accent);
            margin: 30px 0;
        }

        .item-list {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            list-style: none;
        }

        .item-list li {
            margin-bottom: 10px;
            padding-left: 20px;
            position: relative;
        }

        .item-list li::before {
            content: "→";
            position: absolute;
            left: 0;
            color: var(--accent);
        }

        footer {
            margin-top: 80px;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="/" class="back-link">← Return to Home</a>
    
    <header>
        <h1>Known Issues</h1>
        <div class="meta">Published: Feb 2026 • Category: General</div>
    </header>

    <article>

        <h2>Server Issues</h2>
        <ul>
            <li>BuildCraft Quarries do not work when placed inside a GriefPrevention Claim.</li>
        </ul>
    </article>

    <footer>
        &copy; 2026 Machine Craft - Not an official Minecraft product. Not affiliated with Technic (Syndicate LLC).
    </footer>
</div>

</body>
</html>
